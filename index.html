<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHADOW VM - Terminal OS v4.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap');

        :root {
            --bg:         #050705;
            --surface:    #0a0f0a;
            --surface2:   #0f140f;
            --green:      #00ff41;
            --green-dim:  #008f11;
            --green-glow: rgba(0, 255, 65, 0.15);
            --red:        #ff3131;
            --amber:      #ffb300;
            --cyan:       #00e5ff;
            --magenta:    #ff00ff;
            --grey:       #555;
            --white:      #d1d1d1;
            --dim:        #444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

        body {
            background: var(--bg);
            color: var(--green);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* CRT scanline */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.08) 2px,
                rgba(0,0,0,0.08) 4px
            );
            pointer-events: none;
            z-index: 100;
        }

        /* Header */
        #header {
            background: var(--surface);
            padding: 6px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--green-dim);
            font-size: 10px;
            flex-shrink: 0;
            z-index: 10;
        }
        #header-left { display: flex; gap: 14px; align-items: center; }
        #header-right { display: flex; gap: 14px; align-items: center; color: var(--grey); }
        .hdr-label { color: var(--green-dim); }
        .hdr-val { color: var(--green); font-weight: 700; }
        #cpu-bar { 
            width: 60px; height: 6px; background: #111; border: 1px solid #222; border-radius: 2px; display: inline-block; vertical-align: middle;
        }
        #cpu-fill { height: 100%; background: var(--green-dim); border-radius: 2px; transition: width 1s; }

        /* Tab bar */
        #tab-bar {
            background: var(--surface2);
            border-bottom: 1px solid #111;
            display: flex;
            gap: 2px;
            padding: 4px 8px 0;
            flex-shrink: 0;
            z-index: 10;
            overflow-x: auto;
        }
        .tab {
            padding: 4px 12px;
            font-size: 10px;
            color: var(--grey);
            border: 1px solid #111;
            border-bottom: none;
            background: #000;
            border-radius: 3px 3px 0 0;
            cursor: pointer;
            white-space: nowrap;
            user-select: none;
        }
        .tab.active { color: var(--green); border-color: var(--green-dim); background: var(--surface); }
        .tab-add { color: var(--grey); font-size: 14px; padding: 2px 10px; cursor: pointer; }
        .tab-add:hover { color: var(--green); }
        .tab .tab-close { margin-left: 6px; opacity: 0.4; }
        .tab .tab-close:hover { opacity: 1; color: var(--red); }

        /* Main output */
        #terminal-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #output {
            flex: 1;
            overflow-y: auto;
            padding: 12px 14px;
            white-space: pre-wrap;
            word-break: break-all;
            scroll-behavior: smooth;
        }
        #output::-webkit-scrollbar { width: 4px; }
        #output::-webkit-scrollbar-track { background: #000; }
        #output::-webkit-scrollbar-thumb { background: var(--green-dim); }

        .line { line-height: 1.6; min-height: 1.6em; }
        .line.c-green  { color: var(--green); }
        .line.c-amber  { color: var(--amber); }
        .line.c-red    { color: var(--red); }
        .line.c-cyan   { color: var(--cyan); }
        .line.c-magenta{ color: var(--magenta); }
        .line.c-white  { color: var(--white); }
        .line.c-grey   { color: var(--grey); }
        .line.c-dim    { color: var(--dim); }
        .line.cmd-echo { color: var(--white); opacity: 0.7; }

        /* Mobile toolbar */
        #mobile-tools {
            display: flex;
            background: #000;
            border-top: 1px solid #1a1a1a;
            padding: 4px 6px;
            gap: 4px;
            flex-shrink: 0;
            z-index: 10;
            overflow-x: auto;
        }
        .tool-btn {
            flex-shrink: 0;
            background: #0f0f0f;
            border: 1px solid #222;
            color: var(--green);
            padding: 7px 10px;
            font-family: inherit;
            font-size: 11px;
            border-radius: 3px;
            cursor: pointer;
            white-space: nowrap;
        }
        .tool-btn:active { background: var(--green-dim); color: #000; }
        .tool-btn.amber { color: var(--amber); border-color: #443300; }
        .tool-btn.cyan  { color: var(--cyan);  border-color: #003344; }

        /* Input bar */
        #input-bar {
            background: var(--surface);
            padding: 10px 14px;
            display: flex;
            align-items: center;
            border-top: 1px solid #111;
            flex-shrink: 0;
            z-index: 10;
        }
        .prompt-sym  { color: var(--red); font-weight: 700; margin-right: 4px; }
        .prompt-path { color: var(--green-dim); margin-right: 4px; }
        .prompt-hash { color: var(--red); font-weight: 700; margin-right: 8px; }

        #cmd-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--white);
            font-family: inherit;
            font-size: 14px;
            caret-color: var(--green);
        }

        /* Matrix canvas */
        #matrix-canvas {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: none;
            opacity: 0.45;
        }

        /* Note viewer overlay */
        #note-viewer {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 200;
            flex-direction: column;
        }
        #note-viewer.open { display: flex; }
        #note-viewer-header {
            background: var(--surface);
            border-bottom: 1px solid var(--green-dim);
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #note-viewer-title { color: var(--amber); font-weight: 700; font-size: 13px; }
        #note-viewer-close { color: var(--red); cursor: pointer; font-size: 16px; padding: 0 4px; }
        #note-viewer-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            color: var(--white);
            white-space: pre-wrap;
            line-height: 1.7;
            font-size: 13px;
        }

        /* Progress bar */
        .progress-wrap { background: #111; height: 8px; border-radius: 4px; margin: 4px 0; }
        .progress-bar  { height: 100%; background: var(--green); border-radius: 4px; transition: width 0.3s; }

        @media (max-width: 600px) {
            body { font-size: 12px; }
            #cmd-input { font-size: 14px; }
        }
    </style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<!-- Note viewer overlay -->
<div id="note-viewer">
    <div id="note-viewer-header">
        <span id="note-viewer-title">Note</span>
        <span id="note-viewer-close" onclick="closeNote()">&#x2715; [ESC]</span>
    </div>
    <div id="note-viewer-body" id="note-viewer-content"></div>
</div>

<!-- Header -->
<div id="header">
    <div id="header-left">
        <span><span class="hdr-label">SHADOW-OS</span> <span class="hdr-val">v4.0.0</span></span>
        <span><span class="hdr-label">user:</span> <span class="hdr-val" id="hdr-user">guest</span></span>
        <span><span class="hdr-label">notes:</span> <span class="hdr-val" id="hdr-notes">0</span></span>
    </div>
    <div id="header-right">
        <span><span id="cpu-bar"><span id="cpu-fill" style="width:12%"></span></span> CPU</span>
        <span id="clock">00:00:00</span>
    </div>
</div>

<!-- Tab bar -->
<div id="tab-bar">
    <div class="tab active" id="tab-0" onclick="switchTab(0)">terminal</div>
    <div class="tab-add" onclick="newTab()">+</div>
</div>

<!-- Terminal pane -->
<div id="terminal-pane">
    <div id="output"></div>
</div>

<!-- Mobile toolbar -->
<div id="mobile-tools">
    <button class="tool-btn" onclick="handleTool('TAB')">TAB</button>
    <button class="tool-btn" onclick="handleTool('UP')">&#9650;</button>
    <button class="tool-btn" onclick="handleTool('DOWN')">&#9660;</button>
    <button class="tool-btn" onclick="handleTool('CLR')">CLR</button>
    <button class="tool-btn amber" onclick="quickCmd('notes list')">notes</button>
    <button class="tool-btn amber" onclick="quickCmd('grep ')">grep</button>
    <button class="tool-btn cyan"  onclick="quickCmd('note new ')">+ note</button>
    <button class="tool-btn cyan"  onclick="quickCmd('export json')">export</button>
    <button class="tool-btn"       onclick="quickCmd('stats')">stats</button>
    <button class="tool-btn"       onclick="quickCmd('help')">help</button>
</div>

<!-- Input bar -->
<div id="input-bar">
    <span class="prompt-sym">root@shadow:</span><span class="prompt-path" id="current-path">~</span><span class="prompt-hash">#</span>
    <input type="text" id="cmd-input" autofocus spellcheck="false" autocomplete="off" autocapitalize="none" placeholder="type command...">
</div>

<script>
/* ========== STATE ========== */
const state = {
    user: null,
    notes: [],
    tags: new Set(),
    nextId: 1,
    tabs: [{ name: 'terminal', history: [], output: [] }],
    activeTab: 0,
    alias: {},
    env: { HOME: '~', USER: 'root', SHELL: 'shadow-sh' },
    startTime: Date.now(),
    theme: 'green',   // green | amber | cyan
    locked: false,
    lockPin: null,
};

/* ========== FS ========== */
const fs = {
    '~': {
        'projects': { 'shadow_core.py': '# Asisten Shadow v4\nprint("Shadow aktif")' },
        'logs':     { 'auth.log': 'Login success :: root :: shadow-vm v4.0' },
        'exports':  {},
        'readme.txt': 'Shadow VM v4.0 — integrated with Asisten Shadow v3\nKetik "help" untuk daftar perintah.',
    }
};
let currentDir = '~';

/* ========== DOM ========== */
const out     = document.getElementById('output');
const inp     = document.getElementById('cmd-input');
const pathEl  = document.getElementById('current-path');
const canvas  = document.getElementById('matrix-canvas');
const ctx     = canvas.getContext('2d');
const viewer  = document.getElementById('note-viewer');
const hdrUser = document.getElementById('hdr-user');
const hdrNotes = document.getElementById('hdr-notes');

/* ========== PRINT ========== */
function print(text = '', cls = '') {
    const d = document.createElement('div');
    d.className = 'line ' + cls;
    d.innerHTML = text;
    out.appendChild(d);
    setTimeout(() => out.scrollTop = out.scrollHeight, 10);
}
function printSep() { print('<span style="color:#222">─────────────────────────────────────────────────────────</span>'); }
function printBlank() { print(); }
function printSuccess(t) { print('&#10003; ' + t, 'c-green'); }
function printError(t)   { print('&#x2717; ' + t, 'c-red'); }
function printInfo(t)    { print('&#x2139; ' + t, 'c-cyan'); }
function printWarn(t)    { print('&#9888; ' + t, 'c-amber'); }

/* ========== UTILS ========== */
function fmtDate(ts) {
    return new Date(ts).toLocaleString('id-ID', { day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit' });
}
function genId() { return state.nextId++; }
function updateHeader() {
    hdrUser.textContent  = state.user ? state.user.name : 'guest';
    hdrNotes.textContent = state.notes.length;
}
function getDir(path) {
    if (path === '~') return fs['~'];
    const parts = path.replace('~/', '').split('/');
    let node = fs['~'];
    for (const p of parts) { if (node[p] && typeof node[p] === 'object') node = node[p]; else return null; }
    return node;
}

/* ========== CLOCK & CPU ========== */
setInterval(() => {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString('id-ID');
    const cpu = 5 + Math.floor(Math.random() * 20);
    document.getElementById('cpu-fill').style.width = cpu + '%';
}, 1000);

/* ========== MATRIX ========== */
let matrixInterval;
function startMatrix() {
    canvas.style.display = 'block';
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    const chars  = '0123456789ABCDEF#!@$%^&';
    const fs     = 14;
    const cols   = Math.floor(canvas.width / fs);
    const drops  = Array(cols).fill(1);
    function draw() {
        ctx.fillStyle = 'rgba(0,0,0,0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#0f0';
        ctx.font = fs + 'px monospace';
        for (let i = 0; i < drops.length; i++) {
            ctx.fillText(chars[Math.floor(Math.random() * chars.length)], i * fs, drops[i] * fs);
            if (drops[i] * fs > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    matrixInterval = setInterval(draw, 33);
}
function stopMatrix() {
    clearInterval(matrixInterval);
    canvas.style.display = 'none';
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}
window.addEventListener('resize', () => {
    if (canvas.style.display === 'block') { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
});

/* ========== NOTE VIEWER ========== */
function openNote(note) {
    document.getElementById('note-viewer-title').textContent = `[${note.id}] ${note.title}`;
    document.getElementById('note-viewer-body').textContent = note.content;
    viewer.classList.add('open');
}
function closeNote() { viewer.classList.remove('open'); inp.focus(); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeNote(); });

/* ========== TAB SYSTEM ========== */
function newTab() {
    const id = state.tabs.length;
    state.tabs.push({ name: 'shell-' + id, history: [], output: [] });
    const tab = document.createElement('div');
    tab.className = 'tab';
    tab.id = 'tab-' + id;
    tab.innerHTML = 'shell-' + id + ' <span class="tab-close" onclick="closeTab(' + id + ',event)">&#x2715;</span>';
    tab.onclick = () => switchTab(id);
    document.getElementById('tab-bar').insertBefore(tab, document.querySelector('.tab-add'));
    switchTab(id);
}
function switchTab(id) {
    state.activeTab = id;
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === id));
    printInfo('Switched to ' + state.tabs[id].name);
}
function closeTab(id, e) {
    e.stopPropagation();
    if (state.tabs.length <= 1) return printError('Cannot close last tab');
    const tab = document.getElementById('tab-' + id);
    if (tab) tab.remove();
    state.tabs.splice(id, 1);
    switchTab(0);
}

/* ========== ALL COMMANDS ========== */
const COMMANDS = {

    /* ── SYSTEM ── */
    help: (args) => {
        const filter = args[0] ? args[0].toLowerCase() : null;
        const categories = {
            'System': [
                ['help [cat]',       'Tampilkan bantuan (filter: system/notes/fs/net/util/dev)'],
                ['clear',            'Bersihkan layar'],
                ['whoami',           'User info'],
                ['uptime',           'Waktu aktif sistem'],
                ['neofetch',         'Info sistem lengkap'],
                ['uname [-a]',       'Kernel info'],
                ['ps',               'Proses aktif'],
                ['kill [pid]',       'Hentikan proses'],
                ['env',              'Environment variables'],
                ['set KEY=VAL',      'Set environment variable'],
                ['alias NAME=CMD',   'Buat alias perintah'],
                ['history',          'Riwayat perintah'],
                ['exit',             'Restart VM'],
                ['lock [pin]',       'Kunci terminal dengan PIN'],
                ['unlock [pin]',     'Buka kunci terminal'],
            ],
            'Notes': [
                ['note new TITLE',   'Buat catatan baru (multi-line, akhiri END)'],
                ['notes list',       'Daftar semua catatan'],
                ['notes all',        'Daftar + preview content'],
                ['note view ID',     'Buka catatan (overlay viewer)'],
                ['note cat ID',      'Print content catatan ke terminal'],
                ['note del ID',      'Hapus catatan'],
                ['note edit ID',     'Edit catatan'],
                ['note tag ID TAGS', 'Tambah tag ke catatan'],
                ['note pin ID',      'Toggle pin/favorite catatan'],
                ['note lock ID PIN', 'Kunci catatan dengan PIN'],
                ['note unlock ID P', 'Buka kunci catatan'],
                ['note dup ID',      'Duplikat catatan'],
                ['note mv ID TITLE', 'Rename catatan'],
                ['note info ID',     'Meta detail catatan'],
                ['note raw ID',      'Raw dump catatan (JSON)'],
                ['grep QUERY',       'Cari teks dalam semua catatan'],
                ['tags',             'Daftar semua tag'],
                ['tag:TAGNAME',      'Filter catatan by tag'],
                ['stats',            'Statistik catatan'],
                ['pinned',           'Tampilkan catatan ter-pin'],
                ['recent [N]',       'N catatan terbaru (default 5)'],
            ],
            'Filesystem': [
                ['ls [dir]',         'Daftar file/folder'],
                ['ls -la [dir]',     'Detail listing'],
                ['cd [dir]',         'Pindah direktori'],
                ['cat [file]',       'Baca file'],
                ['mkdir [name]',     'Buat direktori'],
                ['touch [file]',     'Buat file kosong'],
                ['rm [file]',        'Hapus file/folder'],
                ['cp SRC DEST',      'Salin file'],
                ['mv SRC DEST',      'Pindah/rename file'],
                ['pwd',              'Current directory'],
                ['tree',             'Tampilkan struktur folder'],
                ['wc [file]',        'Word/line count file'],
                ['head [file]',      'Tampilkan 10 baris pertama'],
                ['tail [file]',      'Tampilkan 10 baris terakhir'],
                ['find NAME',        'Cari file dalam FS'],
                ['write FILE CONTENT','Tulis teks ke file'],
            ],
            'Export/Import': [
                ['export json',      'Export semua notes ke JSON'],
                ['export md',        'Export semua notes ke Markdown'],
                ['export note ID',   'Export satu catatan'],
                ['import FILE',      'Import catatan dari JSON'],
                ['backup',           'Snapshot seluruh state ke file'],
                ['restore FILE',     'Restore dari snapshot'],
            ],
            'Util': [
                ['echo TEXT',        'Print teks'],
                ['calc EXPR',        'Kalkulator (mis: calc 2+2*3)'],
                ['base64 TEXT',      'Encode Base64'],
                ['b64d TEXT',        'Decode Base64'],
                ['hash TEXT',        'SHA-256 hash (simulasi)'],
                ['date',             'Tanggal & waktu sekarang'],
                ['timer N',          'Countdown N detik'],
                ['rand [N]',         'Angka random (0-N, default 100)'],
                ['uuid',             'Generate UUID v4'],
                ['flip',             'Coin flip'],
                ['dice [N]',         'Roll dadu N sisi'],
                ['banner TEXT',      'ASCII art teks'],
                ['matrix',           'Simulasi Matrix (10s)'],
                ['matrix stop',      'Stop Matrix'],
                ['theme [green|amber|cyan]', 'Ganti tema warna'],
                ['credits',          'Tentang Shadow VM v4'],
            ],
        };

        const cats = filter ? Object.entries(categories).filter(([k]) => k.toLowerCase().startsWith(filter)) : Object.entries(categories);
        cats.forEach(([cat, cmds]) => {
            print(`<span style="color:var(--amber);font-weight:700">── ${cat} ──</span>`);
            cmds.forEach(([c, d]) => {
                print(`  <span style="color:var(--green)">${c.padEnd(24)}</span><span style="color:var(--white);opacity:0.8">${d}</span>`);
            });
            printBlank();
        });
    },

    clear: () => { out.innerHTML = ''; },

    whoami: () => {
        if (state.user) {
            print(`uid=0(root) gid=0(root) session=${state.user.name}`);
            print(`Login: ${fmtDate(state.user.loginTime)}`, 'c-dim');
        } else {
            print('root :: guest session (no account logged in)');
        }
    },

    uptime: () => {
        const s = Math.floor((Date.now() - state.startTime) / 1000);
        const m = Math.floor(s / 60), h = Math.floor(m / 60);
        print(`up ${h}h ${m % 60}m ${s % 60}s  load average: ${(Math.random() * 0.3).toFixed(2)}, ${(Math.random() * 0.2).toFixed(2)}, ${(Math.random() * 0.1).toFixed(2)}`);
    },

    neofetch: () => {
        const s = Math.floor((Date.now() - state.startTime) / 60000);
        print([
`<span style="color:var(--green)">       .---.       </span>  <span style="color:var(--amber)">root</span>@<span style="color:var(--amber)">shadow-vm</span>`,
`<span style="color:var(--green)">      /  |  \\      </span>  ────────────────────`,
`<span style="color:var(--green)">     /   |   \\     </span>  <span style="color:var(--green)">OS</span>: ShadowOS 4.0.0 aarch64`,
`<span style="color:var(--green)">    | -- | -- |    </span>  <span style="color:var(--green)">Kernel</span>: 5.15.0-shadow`,
`<span style="color:var(--green)">    |    |    |    </span>  <span style="color:var(--green)">Uptime</span>: ${s} mins`,
`<span style="color:var(--green)">     \\   |   /    </span>  <span style="color:var(--green)">Shell</span>: shadow-sh 2.0`,
`<span style="color:var(--green)">      \\ --- /      </span>  <span style="color:var(--green)">Notes</span>: ${state.notes.length} stored`,
`<span style="color:var(--green)">       '---'       </span>  <span style="color:var(--green)">Memory</span>: ${Math.floor(Math.random()*200+300)}MB / 1536MB`,
`                   <span style="color:var(--green)">CPU</span>: ARM Cortex-A53 @ 1.4GHz`,
`                   <span style="color:var(--magenta)">&#9632;&#9632;&#9632;</span><span style="color:var(--cyan)">&#9632;&#9632;&#9632;</span><span style="color:var(--amber)">&#9632;&#9632;&#9632;</span>`,
        ].join('\n'));
    },

    uname: (args) => {
        if (args[0] === '-a') print('Linux shadow-vm 5.15.0-shadow #1 SMP PREEMPT aarch64 GNU/Linux');
        else print('Linux');
    },

    ps: () => {
        print('<span style="color:var(--green);font-weight:700">  PID  CMD              CPU  MEM</span>');
        [
            ['    1', 'shadow-init',     '0.0', '0.1'],
            ['  420', 'shadow-sh',       '0.1', '0.4'],
            ['  421', 'shadow-notes-db', '0.0', '1.2'],
            ['  422', 'shadow-crypto',   '0.0', '0.6'],
            ['  666', 'matrix-daemon',   '0.0', '0.0'],
        ].forEach(([pid, cmd, cpu, mem]) => {
            print(`<span style="color:var(--cyan)">${pid}</span>  <span style="color:var(--white)">${cmd.padEnd(16)}</span> <span style="color:var(--dim)">${cpu}%  ${mem}%</span>`);
        });
    },

    kill: (args) => {
        if (!args[0]) return printError('Usage: kill [PID]');
        if (args[0] === '666') { printSuccess('matrix-daemon killed'); stopMatrix(); }
        else printSuccess(`Process ${args[0]} terminated`);
    },

    env: () => {
        Object.entries(state.env).forEach(([k, v]) => print(`<span style="color:var(--cyan)">${k}</span>=<span style="color:var(--white)">${v}</span>`));
    },

    set: (args) => {
        if (!args[0] || !args[0].includes('=')) return printError('Usage: set KEY=VALUE');
        const [k, ...v] = args[0].split('=');
        state.env[k] = v.join('=');
        printSuccess(`${k} = ${state.env[k]}`);
    },

    alias: (args) => {
        if (!args[0]) {
            if (!Object.keys(state.alias).length) return printInfo('No aliases defined');
            Object.entries(state.alias).forEach(([k, v]) => print(`alias <span style="color:var(--cyan)">${k}</span>='<span style="color:var(--white)">${v}</span>'`));
            return;
        }
        if (!args[0].includes('=')) return printError('Usage: alias NAME=COMMAND');
        const [k, ...v] = args[0].split('=');
        state.alias[k] = v.join('=');
        printSuccess(`Alias created: ${k}`);
    },

    history: () => {
        const hist = historyLog.slice().reverse();
        if (!hist.length) return printInfo('No history');
        hist.forEach((h, i) => print(`<span style="color:var(--dim)">${String(i+1).padStart(3)}</span>  <span style="color:var(--white)">${h}</span>`));
    },

    exit: () => {
        print('Rebooting Shadow VM...', 'c-amber');
        setTimeout(() => location.reload(), 1200);
    },

    lock: (args) => {
        const pin = args[0];
        if (!pin) return printError('Usage: lock [PIN]');
        state.locked = true;
        state.lockPin = pin;
        printSuccess('Terminal locked. Use: unlock ' + pin.replace(/./g, '*'));
        inp.type = 'password';
    },

    unlock: (args) => {
        if (!state.locked) return printInfo('Terminal is not locked');
        if (args[0] === state.lockPin) {
            state.locked = false;
            state.lockPin = null;
            inp.type = 'text';
            printSuccess('Terminal unlocked');
        } else {
            printError('Wrong PIN');
        }
    },

    /* ── NOTES ── */
    'note': (args) => {
        const sub = args[0];
        if (!sub) return printError('Usage: note [new|view|cat|del|edit|tag|pin|lock|unlock|dup|mv|info|raw] ...');

        if (sub === 'new') {
            const title = args.slice(1).join(' ');
            if (!title) return printError('Usage: note new TITLE');
            startMultilineInput(title);
            return;
        }

        if (sub === 'view') {
            const n = findNote(args[1]);
            if (!n) return;
            openNote(n);
            return;
        }

        if (sub === 'cat') {
            const n = findNote(args[1]);
            if (!n) return;
            printSep();
            print(`<span style="color:var(--amber);font-weight:700">[${n.id}] ${n.title}</span>`);
            print(n.content, 'c-white');
            printSep();
            return;
        }

        if (sub === 'del') {
            const n = findNote(args[1]);
            if (!n) return;
            if (n.locked) return printError('Note is locked. Use: note unlock ID PIN first');
            state.notes = state.notes.filter(x => x.id !== n.id);
            updateHeader();
            printSuccess(`Note #${n.id} "${n.title}" deleted`);
            return;
        }

        if (sub === 'edit') {
            const n = findNote(args[1]);
            if (!n) return;
            if (n.locked) return printError('Note is locked. Unlock first.');
            startMultilineInput(n.title, n, true);
            return;
        }

        if (sub === 'tag') {
            const n = findNote(args[1]);
            if (!n) return;
            const tags = args.slice(2).join(' ').split(',').map(t => t.trim()).filter(Boolean);
            if (!tags.length) return printError('Usage: note tag ID tag1,tag2,...');
            tags.forEach(t => { n.tags.add(t); state.tags.add(t); });
            printSuccess(`Tags added to #${n.id}: ${[...n.tags].join(', ')}`);
            return;
        }

        if (sub === 'pin') {
            const n = findNote(args[1]);
            if (!n) return;
            n.pinned = !n.pinned;
            printSuccess(`Note #${n.id} ${n.pinned ? 'pinned ★' : 'unpinned'}`);
            return;
        }

        if (sub === 'lock') {
            const n = findNote(args[1]);
            if (!n) return;
            const pin = args[2];
            if (!pin) return printError('Usage: note lock ID PIN');
            n.locked = true;
            n.lockPin = pin;
            printSuccess(`Note #${n.id} locked with PIN`);
            return;
        }

        if (sub === 'unlock') {
            const n = findNote(args[1]);
            if (!n) return;
            if (!n.locked) return printInfo('Note is not locked');
            if (args[2] === n.lockPin) { n.locked = false; n.lockPin = null; printSuccess(`Note #${n.id} unlocked`); }
            else printError('Wrong PIN');
            return;
        }

        if (sub === 'dup') {
            const n = findNote(args[1]);
            if (!n) return;
            const copy = { ...n, id: genId(), title: 'Copy of ' + n.title, tags: new Set(n.tags), createdAt: Date.now(), updatedAt: Date.now() };
            state.notes.push(copy);
            updateHeader();
            printSuccess(`Note duplicated: #${copy.id} "${copy.title}"`);
            return;
        }

        if (sub === 'mv') {
            const n = findNote(args[1]);
            if (!n) return;
            const newTitle = args.slice(2).join(' ');
            if (!newTitle) return printError('Usage: note mv ID NEW_TITLE');
            const old = n.title;
            n.title = newTitle;
            n.updatedAt = Date.now();
            printSuccess(`Renamed: "${old}" -> "${newTitle}"`);
            return;
        }

        if (sub === 'info') {
            const n = findNote(args[1]);
            if (!n) return;
            printSep();
            [
                ['ID',      n.id],
                ['Title',   n.title],
                ['Tags',    [...n.tags].join(', ') || '(none)'],
                ['Pinned',  n.pinned ? 'YES ★' : 'no'],
                ['Locked',  n.locked ? 'YES 🔒' : 'no'],
                ['Created', fmtDate(n.createdAt)],
                ['Updated', fmtDate(n.updatedAt)],
                ['Chars',   n.content.length],
                ['Words',   n.content.split(/\s+/).filter(Boolean).length],
                ['Lines',   n.content.split('\n').length],
            ].forEach(([k, v]) => print(`<span style="color:var(--cyan)">${k.padEnd(10)}</span><span style="color:var(--white)">${v}</span>`));
            printSep();
            return;
        }

        if (sub === 'raw') {
            const n = findNote(args[1]);
            if (!n) return;
            const dump = JSON.stringify({ id: n.id, title: n.title, content: n.content, tags: [...n.tags], pinned: n.pinned, createdAt: n.createdAt, updatedAt: n.updatedAt }, null, 2);
            print(`<pre style="color:var(--cyan);font-size:11px">${dump}</pre>`);
            return;
        }

        printError('Unknown sub-command: ' + sub);
    },

    'notes': (args) => {
        const sub = args[0] || 'list';

        if (sub === 'list') {
            if (!state.notes.length) return printInfo('Tidak ada catatan. Buat dengan: note new JUDUL');
            printSep();
            print(`<span style="color:var(--green);font-weight:700">  ID  PIN  LOCK  TAGS                    TITLE</span>`);
            state.notes.forEach(n => {
                const pin  = n.pinned ? '<span style="color:var(--amber)">★</span>' : ' ';
                const lock = n.locked ? '<span style="color:var(--red)">🔒</span>' : '  ';
                const tags = [...n.tags].slice(0,2).map(t => `<span style="color:var(--magenta)">#${t}</span>`).join(' ');
                const title = n.title.length > 38 ? n.title.slice(0, 35) + '...' : n.title;
                print(`<span style="color:var(--cyan)">${String(n.id).padStart(4)}</span>  ${pin}    ${lock}  ${tags.padEnd ? tags : ''}  <span style="color:var(--white)">${title}</span>`);
            });
            printSep();
            printInfo(`Total: ${state.notes.length} note(s). View: note view ID`);
            return;
        }

        if (sub === 'all') {
            if (!state.notes.length) return printInfo('Tidak ada catatan');
            state.notes.forEach(n => {
                print(`<span style="color:var(--amber);font-weight:700">[${n.id}] ${n.title}</span>${n.pinned ? ' ★' : ''}`);
                const preview = n.content.slice(0, 120).replace(/\n/g, ' ');
                print(`  <span style="color:var(--white);opacity:0.7">${preview}${n.content.length > 120 ? '...' : ''}</span>`);
                if (n.tags.size) print(`  <span style="color:var(--magenta)">${[...n.tags].map(t => '#' + t).join(' ')}</span>`);
                printBlank();
            });
        }
    },

    grep: (args) => {
        const q = args.join(' ').toLowerCase();
        if (!q) return printError('Usage: grep QUERY');
        const found = state.notes.filter(n =>
            n.title.toLowerCase().includes(q) || n.content.toLowerCase().includes(q)
        );
        if (!found.length) return printInfo(`No results for: "${q}"`);
        printSuccess(`Found ${found.length} note(s) matching "${q}":`);
        found.forEach(n => {
            const idx = n.content.toLowerCase().indexOf(q);
            const snip = idx >= 0 ? '...' + n.content.slice(Math.max(0, idx - 20), idx + 60) + '...' : '';
            print(`  <span style="color:var(--cyan)">[${n.id}]</span> <span style="color:var(--amber)">${n.title}</span>`);
            if (snip) {
                const hi = snip.replace(new RegExp(q, 'gi'), m => `<span style="background:var(--green);color:#000">${m}</span>`);
                print(`      <span style="color:var(--white);opacity:0.7">${hi}</span>`);
            }
        });
    },

    tags: () => {
        if (!state.tags.size) return printInfo('No tags found');
        const counts = {};
        state.notes.forEach(n => n.tags.forEach(t => { counts[t] = (counts[t] || 0) + 1; }));
        print(`<span style="color:var(--green);font-weight:700">TAG              COUNT</span>`);
        Object.entries(counts).sort((a,b) => b[1]-a[1]).forEach(([t, c]) => {
            print(`<span style="color:var(--magenta)">#${t.padEnd(16)}</span><span style="color:var(--white)">${c}</span>`);
        });
    },

    stats: () => {
        const total     = state.notes.length;
        const pinned    = state.notes.filter(n => n.pinned).length;
        const locked    = state.notes.filter(n => n.locked).length;
        const totalWords= state.notes.reduce((a,n) => a + n.content.split(/\s+/).filter(Boolean).length, 0);
        const totalChars= state.notes.reduce((a,n) => a + n.content.length, 0);
        const uptime    = Math.floor((Date.now() - state.startTime) / 1000);

        printSep();
        print(`<span style="color:var(--amber);font-weight:700">SHADOW VM STATISTICS</span>`);
        printBlank();
        [
            ['Total Notes',  total],
            ['Pinned',       pinned],
            ['Locked',       locked],
            ['Total Tags',   state.tags.size],
            ['Total Words',  totalWords],
            ['Total Chars',  totalChars],
            ['Session Up',   uptime + 's'],
            ['User',         state.user ? state.user.name : 'guest'],
        ].forEach(([k, v]) => print(`  <span style="color:var(--cyan)">${k.padEnd(14)}</span><span style="color:var(--green);font-weight:700">${v}</span>`));
        printSep();
    },

    pinned: () => {
        const p = state.notes.filter(n => n.pinned);
        if (!p.length) return printInfo('No pinned notes');
        p.forEach(n => print(`<span style="color:var(--amber)">★ [${n.id}]</span> <span style="color:var(--white)">${n.title}</span>`));
    },

    recent: (args) => {
        const n = parseInt(args[0]) || 5;
        const r = state.notes.slice().sort((a,b) => b.updatedAt - a.updatedAt).slice(0, n);
        if (!r.length) return printInfo('No notes');
        r.forEach(note => print(`<span style="color:var(--dim)">${fmtDate(note.updatedAt)}</span>  <span style="color:var(--cyan)">[${note.id}]</span> <span style="color:var(--white)">${note.title}</span>`));
    },

    /* ── FILESYSTEM ── */
    ls: (args) => {
        const showDetail = args.includes('-la') || args.includes('-l');
        const targetArg  = args.find(a => !a.startsWith('-'));
        const dir = targetArg ? getDir(currentDir + '/' + targetArg) || getDir(targetArg) : getDir(currentDir);
        if (!dir) return printError('No such directory');
        if (!Object.keys(dir).length) return printInfo('(empty)');
        if (showDetail) {
            print(`<span style="color:var(--dim)">total ${Object.keys(dir).length}</span>`);
            Object.entries(dir).forEach(([name, val]) => {
                const isDir = typeof val === 'object';
                const type  = isDir ? 'd' : '-';
                const size  = isDir ? '4096' : String(JSON.stringify(val).length).padStart(6);
                print(`${type}rwxr-xr-x  ${size}  <span style="${isDir ? 'color:var(--amber)' : 'color:var(--white)'}">${name}${isDir ? '/' : ''}</span>`);
            });
        } else {
            const items = Object.entries(dir).map(([n, v]) =>
                typeof v === 'object' ? `<span style="color:var(--amber);font-weight:700">${n}/</span>` : n
            );
            print(items.join('  '));
        }
    },

    cd: (args) => {
        const t = args[0];
        if (!t || t === '~') { currentDir = '~'; pathEl.textContent = '~'; return; }
        if (t === '..') {
            if (currentDir === '~') return;
            const parts = currentDir.split('/');
            parts.pop();
            currentDir = parts.join('/') || '~';
            pathEl.textContent = currentDir;
            return;
        }
        const dir = getDir(currentDir);
        if (dir && dir[t] && typeof dir[t] === 'object') {
            currentDir = currentDir === '~' ? `~/${t}` : `${currentDir}/${t}`;
            pathEl.textContent = currentDir;
        } else {
            printError(`cd: ${t}: No such directory`);
        }
    },

    cat: (args) => {
        const file = args[0];
        if (!file) return printError('Usage: cat FILE');
        const dir = getDir(currentDir);
        if (dir && dir[file] && typeof dir[file] === 'string') {
            print(dir[file], 'c-white');
        } else {
            printError(`cat: ${file}: No such file`);
        }
    },

    mkdir: (args) => {
        if (!args[0]) return printError('Usage: mkdir NAME');
        const dir = getDir(currentDir);
        if (!dir) return printError('Cannot create directory here');
        dir[args[0]] = {};
        printSuccess(`mkdir: created directory '${args[0]}'`);
    },

    touch: (args) => {
        if (!args[0]) return printError('Usage: touch FILE');
        const dir = getDir(currentDir);
        if (!dir) return;
        dir[args[0]] = '';
        printSuccess(`Created: ${args[0]}`);
    },

    rm: (args) => {
        const name = args[0];
        if (!name) return printError('Usage: rm FILE');
        const dir = getDir(currentDir);
        if (!dir || !(name in dir)) return printError(`rm: ${name}: No such file or directory`);
        delete dir[name];
        printSuccess(`Removed: ${name}`);
    },

    cp: (args) => {
        if (args.length < 2) return printError('Usage: cp SRC DEST');
        const dir = getDir(currentDir);
        if (!dir || !(args[0] in dir)) return printError(`cp: ${args[0]}: No such file`);
        dir[args[1]] = dir[args[0]];
        printSuccess(`Copied: ${args[0]} -> ${args[1]}`);
    },

    mv: (args) => {
        if (args.length < 2) return printError('Usage: mv SRC DEST');
        const dir = getDir(currentDir);
        if (!dir || !(args[0] in dir)) return printError(`mv: ${args[0]}: No such file`);
        dir[args[1]] = dir[args[0]];
        delete dir[args[0]];
        printSuccess(`Moved: ${args[0]} -> ${args[1]}`);
    },

    pwd: () => print(currentDir),

    tree: () => {
        function drawTree(node, prefix = '') {
            const keys = Object.keys(node);
            keys.forEach((k, i) => {
                const isLast = i === keys.length - 1;
                const branch = isLast ? '└── ' : '├── ';
                const isDir  = typeof node[k] === 'object';
                print(`${prefix}${branch}<span style="${isDir ? 'color:var(--amber)' : 'color:var(--white)'}">${k}${isDir ? '/' : ''}</span>`);
                if (isDir) drawTree(node[k], prefix + (isLast ? '    ' : '│   '));
            });
        }
        print(`<span style="color:var(--amber)">${currentDir}</span>`);
        drawTree(getDir(currentDir) || {});
    },

    wc: (args) => {
        const dir = getDir(currentDir);
        const content = dir && dir[args[0]];
        if (typeof content !== 'string') return printError('File not found');
        const lines = content.split('\n').length;
        const words = content.split(/\s+/).filter(Boolean).length;
        const chars = content.length;
        print(`<span style="color:var(--cyan)">${lines}</span> lines  <span style="color:var(--cyan)">${words}</span> words  <span style="color:var(--cyan)">${chars}</span> chars  ${args[0]}`);
    },

    head: (args) => {
        const dir = getDir(currentDir);
        const content = dir && dir[args[0]];
        if (typeof content !== 'string') return printError('File not found');
        content.split('\n').slice(0, 10).forEach(l => print(l, 'c-white'));
    },

    tail: (args) => {
        const dir = getDir(currentDir);
        const content = dir && dir[args[0]];
        if (typeof content !== 'string') return printError('File not found');
        const lines = content.split('\n');
        lines.slice(-10).forEach(l => print(l, 'c-white'));
    },

    find: (args) => {
        if (!args[0]) return printError('Usage: find NAME');
        const results = [];
        function search(node, path) {
            Object.keys(node).forEach(k => {
                if (k.includes(args[0])) results.push(path + '/' + k);
                if (typeof node[k] === 'object') search(node[k], path + '/' + k);
            });
        }
        search(fs['~'], '~');
        if (!results.length) return printInfo('Not found: ' + args[0]);
        results.forEach(r => print(r, 'c-cyan'));
    },

    write: (args) => {
        const file = args[0];
        const content = args.slice(1).join(' ');
        if (!file || !content) return printError('Usage: write FILE CONTENT');
        const dir = getDir(currentDir);
        if (!dir) return;
        dir[file] = content;
        printSuccess(`Written to ${file} (${content.length} chars)`);
    },

    /* ── EXPORT/IMPORT ── */
    export: (args) => {
        const sub = args[0];

        if (sub === 'json') {
            const data = state.notes.map(n => ({
                id: n.id, title: n.title, content: n.content,
                tags: [...n.tags], pinned: n.pinned,
                createdAt: new Date(n.createdAt).toISOString(),
                updatedAt: new Date(n.updatedAt).toISOString(),
            }));
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            downloadBlob(blob, 'shadow-notes-export.json');
            printSuccess(`Exported ${data.length} notes as JSON`);
            return;
        }

        if (sub === 'md') {
            let md = `# Shadow Notes Export\n_${new Date().toLocaleString()}_\n\n---\n\n`;
            state.notes.forEach(n => {
                md += `## [${n.id}] ${n.title}\n`;
                md += `**Tags:** ${[...n.tags].join(', ') || 'none'}  |  **Pinned:** ${n.pinned ? 'Yes' : 'No'}\n\n`;
                md += n.content + '\n\n---\n\n';
            });
            const blob = new Blob([md], { type: 'text/markdown' });
            downloadBlob(blob, 'shadow-notes.md');
            printSuccess('Exported as Markdown');
            return;
        }

        if (sub === 'note') {
            const n = findNote(args[1]);
            if (!n) return;
            const blob = new Blob([n.content], { type: 'text/plain' });
            downloadBlob(blob, `note-${n.id}-${n.title.replace(/\s+/g, '-')}.txt`);
            printSuccess(`Exported note #${n.id}`);
            return;
        }

        printError('Usage: export [json|md|note ID]');
    },

    backup: () => {
        const data = {
            version: '4.0',
            timestamp: new Date().toISOString(),
            notes: state.notes.map(n => ({ ...n, tags: [...n.tags] })),
            nextId: state.nextId,
            env: state.env,
            alias: state.alias,
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        downloadBlob(blob, `shadow-backup-${Date.now()}.json`);
        printSuccess('Backup created and downloaded');
    },

    import: (args) => {
        printInfo('Use file picker to select JSON backup...');
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = e => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                try {
                    const data = JSON.parse(ev.target.result);
                    const notes = Array.isArray(data) ? data : data.notes;
                    if (!notes) throw new Error('Invalid format');
                    notes.forEach(n => {
                        state.notes.push({ ...n, tags: new Set(n.tags || []), id: genId(), createdAt: Date.now(), updatedAt: Date.now() });
                        (n.tags || []).forEach(t => state.tags.add(t));
                    });
                    updateHeader();
                    printSuccess(`Imported ${notes.length} notes`);
                } catch(e) { printError('Import failed: ' + e.message); }
            };
            reader.readAsText(file);
        };
        input.click();
    },

    restore: (args) => COMMANDS.import(args),

    /* ── UTIL ── */
    echo: (args) => print(args.join(' '), 'c-white'),

    calc: (args) => {
        try {
            const expr = args.join(' ').replace(/[^0-9+\-*/.() ^%]/g, '');
            if (!expr) return printError('Usage: calc EXPRESSION');
            const result = Function(`"use strict"; return (${expr})`)();
            print(`${args.join(' ')} = <span style="color:var(--green);font-weight:700">${result}</span>`);
        } catch(e) { printError('Invalid expression'); }
    },

    base64: (args) => {
        const t = args.join(' ');
        if (!t) return printError('Usage: base64 TEXT');
        print(btoa(unescape(encodeURIComponent(t))), 'c-cyan');
    },

    b64d: (args) => {
        try { print(decodeURIComponent(escape(atob(args[0]))), 'c-white'); }
        catch(e) { printError('Invalid base64'); }
    },

    hash: (args) => {
        const t = args.join(' ');
        if (!t) return printError('Usage: hash TEXT');
        // Simple non-crypto hash for display
        let h = 0;
        for (let i = 0; i < t.length; i++) { h = ((h << 5) - h) + t.charCodeAt(i); h |= 0; }
        const hex = (h >>> 0).toString(16).padStart(8, '0').repeat(8).slice(0, 64);
        print(`SHA-256(${t}) =`, 'c-dim');
        print(hex, 'c-cyan');
        printInfo('(simulation — use Python hashlib for real crypto)');
    },

    date: () => {
        const now = new Date();
        print(now.toLocaleString('id-ID', { weekday:'long',year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit' }), 'c-white');
        print(`Unix timestamp: ${Math.floor(now.getTime()/1000)}`, 'c-dim');
    },

    timer: (args) => {
        const secs = parseInt(args[0]);
        if (!secs || secs < 1) return printError('Usage: timer N (seconds)');
        printInfo(`Countdown: ${secs}s`);
        let rem = secs;
        const iv = setInterval(() => {
            rem--;
            if (rem <= 0) {
                clearInterval(iv);
                print(`<span style="color:var(--red);font-weight:700">&#9650; TIMER DONE! ${secs}s elapsed</span>`);
            } else if (rem <= 5) {
                print(`  <span style="color:var(--amber)">${rem}...</span>`);
            }
        }, 1000);
    },

    rand: (args) => {
        const n = parseInt(args[0]) || 100;
        print(String(Math.floor(Math.random() * (n + 1))), 'c-green');
    },

    uuid: () => {
        const uuid = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
            const r = Math.random() * 16 | 0;
            return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
        });
        print(uuid, 'c-cyan');
    },

    flip: () => print(Math.random() > 0.5 ? '<span style="color:var(--green)">HEADS</span>' : '<span style="color:var(--amber)">TAILS</span>'),

    dice: (args) => {
        const n = parseInt(args[0]) || 6;
        const r = Math.floor(Math.random() * n) + 1;
        print(`d${n}: <span style="color:var(--green);font-weight:700">${r}</span>`);
    },

    banner: (args) => {
        const text = args.join(' ').toUpperCase().slice(0, 8);
        if (!text) return printError('Usage: banner TEXT');
        // Simple block letters using full-width chars
        print(`<span style="color:var(--amber);font-size:18px;letter-spacing:4px;font-weight:700">▓▓▓ ${text} ▓▓▓</span>`);
    },

    matrix: (args) => {
        if (args[0] === 'stop') { stopMatrix(); printInfo('Matrix stopped'); return; }
        startMatrix();
        print('Matrix initiated. <span style="color:var(--dim)">matrix stop</span> or wait 15s.', 'c-green');
        setTimeout(() => { stopMatrix(); printInfo('Matrix stopped'); }, 15000);
    },

    theme: (args) => {
        const t = args[0];
        const themes = {
            green:  { '--green': '#00ff41', '--green-dim': '#008f11', '--red': '#ff3131', '--amber': '#ffb300' },
            amber:  { '--green': '#ffb300', '--green-dim': '#996800', '--red': '#ff4444', '--amber': '#00ff41' },
            cyan:   { '--green': '#00e5ff', '--green-dim': '#007a87', '--red': '#ff3131', '--amber': '#ffb300' },
            red:    { '--green': '#ff4444', '--green-dim': '#880000', '--red': '#ff9900', '--amber': '#00ff41' },
        };
        if (!t || !themes[t]) return printInfo(`Available: ${Object.keys(themes).join(', ')}`);
        Object.entries(themes[t]).forEach(([k, v]) => document.documentElement.style.setProperty(k, v));
        state.theme = t;
        printSuccess(`Theme: ${t}`);
    },

    credits: () => {
        print([
            `<span style="color:var(--amber);font-weight:700">SHADOW VM v4.0</span>`,
            `<span style="color:var(--dim)">Integrated Terminal OS for Asisten Shadow v3</span>`,
            ``,
            `<span style="color:var(--cyan)">Components:</span>`,
            `  Shadow VM    — Browser terminal emulator`,
            `  Asisten Shadow v3 — Encrypted notes backend`,
            `  Crypto layer — AES-256-GCM (Python side)`,
            ``,
            `<span style="color:var(--cyan)">Repo:</span>`,
            `  github.com/suryadi346-star/asisten-shadow-v3`,
            `  github.com/suryadi346-star/shadow-vm`,
            ``,
            `<span style="color:var(--dim)">type 'help' for full command reference</span>`,
        ].join('\n'));
    },
};

/* ========== TAG FILTER ========== */
function handleTagFilter(raw) {
    const tag = raw.slice(4);
    const found = state.notes.filter(n => n.tags.has(tag));
    if (!found.length) return printInfo(`No notes with tag #${tag}`);
    printSuccess(`Notes tagged #${tag}: ${found.length}`);
    found.forEach(n => print(`  <span style="color:var(--cyan)">[${n.id}]</span> <span style="color:var(--white)">${n.title}</span>`));
}

/* ========== FIND NOTE HELPER ========== */
function findNote(idStr) {
    if (!idStr) { printError('Provide note ID'); return null; }
    const id = parseInt(idStr);
    const n = state.notes.find(x => x.id === id);
    if (!n) { printError(`Note #${id} not found`); return null; }
    return n;
}

/* ========== DOWNLOAD HELPER ========== */
function downloadBlob(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
}

/* ========== MULTILINE INPUT (note new / note edit) ========== */
let mlActive = false, mlLines = [], mlTitle = '', mlNote = null, mlEditing = false;

function startMultilineInput(title, note = null, editing = false) {
    mlActive  = true;
    mlLines   = [];
    mlTitle   = title;
    mlNote    = note;
    mlEditing = editing;
    printBlank();
    if (editing) {
        printInfo(`Editing note #${note.id}: "${title}"`);
        printWarn('Current content will be replaced. Type new content.');
    } else {
        printInfo(`New note: "${title}"`);
    }
    printInfo('Type content. End with a line containing only: END');
    print('<span style="color:var(--dim)">───────────────── content ─────────────────</span>');
    inp.placeholder = 'content... (END to finish)';
}

function handleMultiline(raw) {
    if (raw.trim().toUpperCase() === 'END' || raw.trim() === '---END---') {
        const content = mlLines.join('\n');
        if (!content.trim()) {
            printWarn('Empty content — cancelled');
        } else {
            if (mlEditing && mlNote) {
                mlNote.content = content;
                mlNote.updatedAt = Date.now();
                printSuccess(`Note #${mlNote.id} updated (${content.length} chars)`);
            } else {
                const now = Date.now();
                const note = { id: genId(), title: mlTitle, content, tags: new Set(), pinned: false, locked: false, lockPin: null, createdAt: now, updatedAt: now };
                state.notes.push(note);
                updateHeader();
                printSuccess(`Note #${note.id} created: "${mlTitle}" (${content.length} chars)`);
                printInfo('View: note view ' + note.id);
            }
        }
        mlActive = false;
        inp.placeholder = 'type command...';
        print('<span style="color:var(--dim)">───────────────────────────────────────────</span>');
        printBlank();
        return;
    }
    mlLines.push(raw);
    // echo the line
    const d = document.createElement('div');
    d.className = 'line c-white';
    d.style.opacity = '0.8';
    d.textContent = raw;
    out.appendChild(d);
    setTimeout(() => out.scrollTop = out.scrollHeight, 10);
}

/* ========== COMMAND HISTORY ========== */
const historyLog = [];
let histIdx = -1;

/* ========== EXEC ========== */
function exec() {
    const raw = inp.value;
    if (!raw.trim()) return;

    // Lock check
    if (state.locked && !raw.startsWith('unlock')) {
        printError('Terminal locked. Use: unlock PIN');
        inp.value = '';
        return;
    }

    // Multiline mode
    if (mlActive) { handleMultiline(raw); inp.value = ''; return; }

    // Print prompt + command
    print(
        `<span style="color:var(--red);font-weight:700">root@shadow:</span><span style="color:var(--green-dim)">${currentDir}</span><span style="color:var(--red);">#</span> <span style="color:var(--white)">${raw}</span>`,
        'cmd-echo'
    );

    historyLog.unshift(raw);
    histIdx = -1;
    inp.value = '';

    // Alias expand
    const [firstWord, ...rest] = raw.trim().split(' ');
    const expanded = state.alias[firstWord] ? state.alias[firstWord] + ' ' + rest.join(' ') : raw;
    const [cmd, ...args] = expanded.trim().split(/\s+/);

    // tag: shorthand
    if (cmd.startsWith('tag:')) { handleTagFilter(cmd); return; }

    if (COMMANDS[cmd]) {
        try { COMMANDS[cmd](args); }
        catch(e) { printError('Runtime error: ' + e.message); }
    } else {
        printError(`Command not found: <span style="color:var(--white)">${cmd}</span>  (try <span style="color:var(--green)">help</span>)`);
    }
}

/* ========== INPUT EVENTS ========== */
inp.addEventListener('keydown', e => {
    if (e.key === 'Enter')     { exec(); }
    if (e.key === 'ArrowUp')   { handleTool('UP'); }
    if (e.key === 'ArrowDown') { handleTool('DOWN'); }
    if (e.key === 'Tab')       { e.preventDefault(); handleTool('TAB'); }
    if (e.key === 'l' && e.ctrlKey) { e.preventDefault(); COMMANDS.clear(); }
    if (e.key === 'c' && e.ctrlKey && mlActive) {
        mlActive = false;
        inp.placeholder = 'type command...';
        printWarn('^C — input cancelled');
    }
});

function handleTool(action) {
    inp.focus();
    if (action === 'TAB') {
        const partial = inp.value.toLowerCase();
        const allCmds = [...Object.keys(COMMANDS), ...Object.keys(state.alias)];
        const match = allCmds.find(c => c.startsWith(partial) && c !== partial);
        if (match) inp.value = match;
    } else if (action === 'UP') {
        if (histIdx < historyLog.length - 1) inp.value = historyLog[++histIdx];
    } else if (action === 'DOWN') {
        if (histIdx > 0) { inp.value = historyLog[--histIdx]; }
        else { histIdx = -1; inp.value = ''; }
    } else if (action === 'CLR') {
        inp.value = '';
    }
}

function quickCmd(cmd) { inp.value = cmd; inp.focus(); }

document.addEventListener('click', e => { if (e.target.tagName !== 'BUTTON') inp.focus(); });
